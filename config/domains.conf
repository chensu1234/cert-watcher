# cert-watcher 域名配置文件
# 格式: domain:port
# # 开头的行为注释

# ===========================================
# 全局设置（可选）
# ===========================================
# interval = 86400      # 检查间隔（秒），默认 86400 (24小时)
# timeout = 10          # 连接超时（秒），默认 10
# warning_days = 30     # 警告阈值（天），默认 30
# critical_days = 7      # 严重阈值（天），默认 7
# console = true         # 控制台输出
# webhook_url = https://hooks.slack.com/services/xxx
# bark_url = https://api.day.app/your_key

# ===========================================
# 公共证书示例
# ===========================================
github.com:443
cloudflare.com:443
microsoft.com:443

# ===========================================
# 自签名/内部服务
# ===========================================
# internal.company.local:8443
# dev-api.company.com:443
