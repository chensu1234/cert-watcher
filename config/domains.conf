# cert-watcher 域名配置文件
# 格式: domain[:port[:alert_days]]
#   domain      - 域名或 IP 地址
#   port        - HTTPS 端口 (可选，默认 443)
#   alert_days  - 提前告警天数 (可选，默认使用命令行 -d 参数)
#
# 示例:
#   example.com              # 使用默认端口和告警天数
#   example.com:443:14       # 自定义端口和告警天数
#   192.168.1.1:8443:7      # IP 地址和自定义端口

# ============================================================
# 常用网站
# ============================================================
google.com
github.com
cloudflare.com

# ============================================================
# 国内常用网站
# ============================================================
baidu.com
aliyun.com
tencent.com

# ============================================================
# 示例: 自定义配置
# ============================================================
# mysite.com:443:14         # 14 天前告警
# api.mysite.com:8443:7     # 7 天前告警
