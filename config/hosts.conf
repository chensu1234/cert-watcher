# cert-watcher 主机配置
# 格式: host:port
# # 开头的行为注释
#
# 可选扩展格式: host:port#warn_days
# 例如: example.com:443#14  (这只主机14天就告警)

# ============================================================
# 常用网站
# ============================================================
github.com:443
google.com:443
cloudflare.com:443

# ============================================================
# 示例: 需要监控的服务
# ============================================================
# example.com:443
# api.example.com:443
# shop.example.com:443

# ============================================================
# 内部服务 (需要内网或 VPN)
# ============================================================
# mysql.internal:3306
# redis.internal:6379
# postgres.internal:5432
