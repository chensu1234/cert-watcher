# cert-watcher 配置文件
# 格式: host:port [warning_days...]
# - 空行和 # 开头的行会被忽略
# - warning_days 可选，逗号分隔，默认使用命令行指定的阈值
# - 建议监控自己常用的服务，方便及时发现证书问题

# ============================================================
# 常用互联网服务 (示例)
# ============================================================

# 搜索引擎
google.com:443
bing.com:443

# 云服务
github.com:443
gitlab.com:443
cloudflare.com:443

# 国内服务
baidu.com:443
aliyun.com:443
tencent.com:443

# 认证/支付
letsencrypt.org:443

# ============================================================
# 自定义阈值示例
# ============================================================
# localhost:8443 30,14,7,3   # 提前 30/14/7/3 天告警
# example.com:443  14,7,3     # 提前 14/7/3 天告警
