# =============================================================================
# cert-watcher Configuration File
# =============================================================================
#
# This file contains the list of certificates to monitor.
# Each line can be either:
#
#   1. Remote host:port format:
#      example.com:443
#      mail.google.com:993
#      imap.gmail.com:993
#
#   2. Local certificate file path (absolute path, starts with /):
#      /etc/ssl/certs/ssl-cert-snakeoil.pem
#      /etc/letsencrypt/live/example.com/fullchain.pem
#      /path/to/your/certificate.crt
#
# Lines starting with # are treated as comments and ignored.
# Blank lines are also ignored.
# Inline comments are supported (text after # on a line).
#
# =============================================================================

# -----------------------------------------------------------------------------
# Remote Hosts
# -----------------------------------------------------------------------------

# Popular websites (for testing)
google.com:443
github.com:443
cloudflare.com:443

# Mail servers
# imap.gmail.com:993
# smtp.gmail.com:587
# mail.example.com:993

# Database servers (PostgreSQL with SSL)
# db.example.com:5432
# mysql.example.com:3306

# Custom hosts
# localhost:8443
# vpn.example.com:443
# api.example.com:443

# -----------------------------------------------------------------------------
# Local Certificate Files
# -----------------------------------------------------------------------------

# Debian/Ubuntu snakeoil certificate (for testing)
# /etc/ssl/certs/ssl-cert-snakeoil.pem

# Let's Encrypt certificates
# /etc/letsencrypt/live/example.com/fullchain.pem
# /etc/letsencrypt/live/example.com/cert.pem

# Apache/Nginx certificates
# /etc/ssl/certs/server.crt
# /etc/nginx/ssl/server.crt

# Custom certificates
# /opt/ssl/certs/my-cert.pem
# /home/user/certs/api-certificate.crt

# -----------------------------------------------------------------------------
# Notes
# -----------------------------------------------------------------------------
#
# - For local files, the script will automatically detect if it's a
#   certificate bundle and extract the first certificate.
#
# - For remote hosts, SNI (Server Name Indication) is used automatically,
#   so the hostname in the config should match the certificate's CN/SAN.
#
# - If a host uses a non-standard port, simply specify it:
#   example.com:8443
#
# - The script requires network access to check remote certificates.
#
# =============================================================================
